services:
  # Python Backend (FastAPI)
  - type: web
    name: crm-hcp-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-hcp-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Set manually in dashboard

  # React Frontend (Static Site)
  - type: static
    name: crm-hcp-frontend
    region: oregon
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishDir: "frontend/dist"
    envVars:
      - key: VITE_API_BASE
        value: https://crm-hcp-backend.onrender.com/api # Placeholder, update after backend is live

databases:
  - name: crm-hcp-db
    region: oregon
    plan: free
