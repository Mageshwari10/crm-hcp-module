services:
  # Python Backend (FastAPI)
  - type: web
    name: crm-hcp-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-hcp-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: crm-hcp-db
    region: oregon
    plan: free
