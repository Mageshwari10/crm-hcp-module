services:
  # React Frontend (Static Site)
  - type: static_site
    name: crm-hcp-frontend
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - path: "/*"
        destination: /index.html

  # Python Backend (FastAPI)
  - type: web
    name: crm-hcp-backend
    runtime: python
    runtimeVersion: 3.11.9
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install --only-binary :all: --no-cache-dir -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-hcp-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: crm-hcp-db
    region: oregon
    plan: free
